<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warp-Chat MVP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
</head>
<body>
  <div id="cmd-palette-overlay" class="cmd-palette-overlay hidden">
    <div class="cmd-palette" role="dialog" aria-modal="true" aria-label="Command palette">
      <div class="cmd-input-wrapper">
        <button id="cmd-back-btn" class="cmd-back hidden" type="button" aria-label="Back to main controls">Back</button>
        <span class="cmd-icon">⌘</span>
        <input type="text" id="cmd-input" placeholder="Search controls..." autocomplete="off">
      </div>
      <div class="cmd-meta">
        <span id="cmd-mode-label">Controls</span>
        <span class="cmd-meta-hint">↑↓ select · ↵ confirm · esc close</span>
      </div>
      <div class="cmd-results" id="cmd-results"></div>
    </div>
  </div>

  <div id="settings-modal-overlay" class="modal-overlay hidden">
    <div class="settings-modal" role="dialog" aria-modal="true" aria-label="Advanced settings">
      <div class="settings-header">
        <h2>Advanced Settings</h2>
      </div>
      <div class="settings-content">
        <div class="settings-field">
          <label for="model-select">AI Model</label>
          <select id="model-select" class="settings-input">
            <option value="qwen3.5:4b">Loading models...</option>
          </select>
        </div>
        <div class="settings-field">
          <label for="temp-slider">Temperature: <span id="temp-val">0.7</span></label>
          <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="0.7" class="settings-slider">
        </div>
        <div class="settings-field">
          <label for="ctx-slider">Context Window: <span id="ctx-val">8192</span></label>
          <input type="range" id="ctx-slider" min="2048" max="131072" step="2048" value="8192" class="settings-slider">
        </div>
      </div>
      <div class="settings-footer">
        <button id="settings-close-btn" class="settings-btn" type="button">Cancel</button>
        <button id="settings-save-btn" class="settings-btn primary" type="button">Save</button>
      </div>
    </div>
  </div>

  <div id="system-modal-overlay" class="modal-overlay hidden">
    <div class="settings-modal" role="dialog" aria-modal="true" aria-label="System prompt">
      <div class="settings-header">
        <h2>System Prompt</h2>
      </div>
      <div class="settings-content">
        <div class="settings-field">
          <label for="system-input">Behavior guidance</label>
          <textarea
            id="system-input"
            class="settings-input system-textarea"
            rows="5"
            placeholder="Set the behavior, tone, or constraints for the local model."
          ></textarea>
        </div>
      </div>
      <div class="settings-footer">
        <button id="system-close-btn" class="settings-btn" type="button">Cancel</button>
        <button id="system-save-btn" class="settings-btn primary" type="button">Save</button>
      </div>
    </div>
  </div>

  <div class="mesh-bg"></div>

  <div class="titlebar-drag-region">
    <div class="hud-status">
      <span class="status-dot"></span>
      <span id="status-text">Local model standing by</span>
    </div>
  </div>

  <main id="app-layout" class="app-layout" role="main" data-empty="true">
    <section id="launch-state" class="launch-state">
      <p class="launch-kicker">Warp-Chat</p>
      <h1 class="launch-title">KOD ÄR KRAFT</h1>
      <p id="launch-copy" class="launch-copy">
        Ask a question, inspect a file, or iterate on code. Use Cmd+K for model, workspace, and session controls.
      </p>
    </section>

    <div id="messages" class="messages-list" aria-live="polite" aria-relevant="additions"></div>

    <div class="input-container">
      <div class="input-toolbar">
        <div class="toolbar-group">
          <button id="workspace-pill" class="toolbar-pill" type="button" title="Open workspace controls">
            <span class="toolbar-pill-label">Workspace</span>
            <span id="active-folder-name" class="toolbar-pill-value">Global</span>
          </button>
          <button id="model-pill" class="toolbar-pill" type="button" title="Open model controls">
            <span class="toolbar-pill-label">Model</span>
            <span id="active-model-name" class="toolbar-pill-value">qwen3.5:4b</span>
          </button>
        </div>
        <div class="toolbar-group toolbar-group-right">
          <button id="stop-btn" class="stop-btn hidden" type="button">Stop</button>
          <span id="token-counter" class="token-counter">0 / 8,192 ctx</span>
        </div>
      </div>

      <div class="input-wrapper">
        <span class="prompt-icon">›</span>
        <textarea
          id="prompt-input"
          placeholder="Message the model, ask for code, or describe a task..."
          rows="1"
          autofocus
        ></textarea>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      mermaid.initialize({ startOnLoad: false, theme: "dark" });
    });
  </script>
  <script src="renderer.js"></script>
</body>
</html>
